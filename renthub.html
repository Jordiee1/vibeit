<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rent Hub – VIBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-gray">

  <nav class="navbar" id="navbar">
    <div class="nav-logo">
      <img src="assets/images/logo.svg" alt="VIBIT Logo" onerror="this.src=''; this.alt='VIBIT';">
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">หน้าหลัก</a></li>
      <li><a href="renthub.html" class="active">แหล่งรวมร้านเช่า</a></li>
      <li><a href="localhub.html">แหล่งรวมบัดดี้</a></li>
      <li><a href="vibehow.html">วิธีใช้งาน</a></li>
    </ul>
    <a href="interact.html" class="btn-nav">เข้าสู่ระบบด้วย LINE</a>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>
    <div class="mobile-menu-overlay" id="mobileMenu">
    <div class="mobile-menu-header">
      <div class="nav-logo">
        <img src="assets/images/logo.svg" alt="VIBIT" onerror="this.src=''; this.alt='VIBIT';">
      </div>
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    
    <ul class="mobile-nav-links">
      <li><a href="index.html">หน้าหลัก</a></li>
      <li><a href="renthub.html" class="active">แหล่งรวมร้านเช่า</a></li>
      <li><a href="localhub.html">แหล่งรวมบัดดี้</a></li>
      <li><a href="vibehow.html">วิธีใช้งาน</a></li>
    </ul>

    <div class="mobile-menu-footer">
      <a href="interact.html" class="btn-primary" style="width: 100%; justify-content: center; background: #06C755;">เข้าสู่ระบบด้วย LINE</a>
    </div>
  </div>

  <div class="page-wrap">
    <section class="rent-hub-header">
      <div class="rent-container">
        <h1 class="rent-title" style="animation: fadeInUp 0.5s ease both;">Rent Hub</h1>
        <p class="rent-sub" style="animation: fadeInUp 0.5s 0.1s ease both;">ค้นหาชุดเด็ดและไอเทมโดนใจ สำหรับทริปต่อไปของคุณ</p>

        <div class="system-toolbar" style="animation: fadeInUp 0.5s 0.2s ease both;">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อรุ่น, แบรนด์, หรือแท็ก (เช่น Y2K, Sony)...">
          </div>
          
          <div class="filter-controls">
            <div class="filter-tabs" id="categoryFilters">
              <button class="f-tab active" data-type="all">ทั้งหมด</button>
              <button class="f-tab" data-type="outfit">เสื้อผ้า</button>
              <button class="f-tab" data-type="camera">กล้อง/ไอเทม</button>
            </div>
            
            <label class="toggle-switch">
              <input type="checkbox" id="availableToggle">
              <span class="toggle-slider"></span>
              <span class="toggle-label">แสดงเฉพาะที่ว่าง</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="rent-hub-content">
      <div class="rent-container">
        <div class="rent-grid" id="rentGrid">
          </div>
        
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-icon">🔍</div>
          <h3>ไม่พบไอเทมที่คุณค้นหา</h3>
          <p>ลองเปลี่ยนคำค้นหา หรือล้างตัวกรองดูนะ</p>
          <button class="btn-ghost mt-3" id="resetBtn">ล้างการค้นหา</button>
        </div>
      </div>
    </section>
  </div>

  <script src="rh.js"></script>
    <script src="script.js"></script>
</body>
</html>
